<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Navigation</title>
    <!-- Pastikan menyertakan ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</head>
<body>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

:root {
    --clr: #14161e;
}

body {
    min-height: 100vh;
    background: var(--clr);
}

/* Sidebar Styling */
.sidebar {
    position: absolute;
    width: 80px;
    height: 100vh;
    background: #fff;
    transition: 0.5s;
    padding-left: 10px;
    overflow: hidden;
}

.sidebar.active {
    width: 300px;
}

.sidebar ul {
    position: relative;
    height: 100vh;
}

.sidebar ul li {
    position: relative;
    list-style: none;
}

.sidebar ul li.active {
    background: var(--clr);
    border-top-left-radius: 50px;
    border-bottom-left-radius: 50px;
}

/* Curve Effects */
.sidebar ul li.active::before {
    content: '';
    position: absolute;
    bottom: -20px;
    right: 0;
    width: 20px;
    height: 20px;
    border-top-right-radius: 20px;
    box-shadow: 5px -5px 0 5px var(--clr);
    background: transparent;
}

.sidebar ul li.active::after {
    content: '';
    position: absolute;
    top: -20px;
    right: 0;
    width: 20px;
    height: 20px;
    border-bottom-right-radius: 20px;
    box-shadow: 5px 5px 0 5px var(--clr);
    background: transparent;
}

/* Logo & Menu Items */
.sidebar ul li.logo { margin-bottom: 50px; }
.sidebar ul li.logo .icon { font-size: 2em; color: var(--clr); }
.sidebar ul li.logo .text { font-size: 1.2em; font-weight: 500; color: var(--clr); }

.sidebar ul li a {
    position: relative;
    display: flex;
    white-space: nowrap;
    text-decoration: none;
}

.sidebar ul li a .icon {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    min-width: 60px;
    padding-left: 10px;
    height: 70px;
    font-size: 1.5em;
    color: #333;
    transition: 0.5s;
}

.sidebar ul li a .text {
    position: relative;
    height: 70px;
    display: flex;
    align-items: center;
    font-size: 1em;
    color: #333;
    padding-left: 15px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: 0.5s;
}

.sidebar ul li.active a .icon { color: #fff; }
.sidebar ul li.active a .text { color: var(--bg); }

/* Hover Effects */
.sidebar ul li:hover a .icon,
.sidebar ul li:hover a .text {
    color: var(--bg);
}

.sidebar ul li.active a .icon::before {
    content: '';
    position: absolute;
    inset: 5px;
    width: 60px;
    background: var(--bg);
    border-radius: 50%;
    transition: 0.5s;
}

.sidebar ul li:hover.active a .icon::before { background: #fff; }

/* Menu Toggle Button */
.MenuToggle {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: #31a4ff;
    z-index: 1000;
    cursor: pointer;
}

.MenuToggle::before {
    content: '';
    position: absolute;
    left: 10px;
    top: 22.5px;
    width: 30px;
    height: 3px;
    background: #fff;
    transform: translateY(-9px);
    transition: 0.5s;
    box-shadow: 0 9px 0 #fff;
}

.MenuToggle::after {
    content: '';
    position: absolute;
    left: 10px;
    top: 22.5px;
    width: 30px;
    height: 3px;
    background: #fff;
    transform: translateY(9px);
    transition: 0.5s;
}

.MenuToggle.active::before {
    transform: translateY(0px) rotate(45deg);
    box-shadow: 0 0 0 #fff;
}

.MenuToggle.active::after {
    transform: translateY(0px) rotate(-45deg);
}

/* Profile Image Styling */
.bottom { position: absolute; bottom: 0; width: 100%; }
.imgBx {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
}
.imgBx img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
}
</style>
    <div class="MenuToggle"></div>
    <div class="sidebar">
        <ul>
            <!-- Logo Section -->
            <li class="logo" style="--bg:#333;">
                <a href="#">
                    <div class="icon">
                        <ion-icon name="image-outline"></ion-icon>
                    </div>
                    <div class="text">Website Logo</div>
                </a>
            </li>

            <!-- Menu List -->
            <div class="Menulist">
                <li style="--bg:#f44336;" class="active">
                    <a href="#">
                        <div class="icon">
                            <ion-icon name="home-outline"></ion-icon>
                        </div>
                        <div class="text">Home</div>
                    </a>
                </li>
                <li style="--bg:#ffa117;">
                    <a href="#">
                        <div class="icon">
                            <ion-icon name="person-outline"></ion-icon>
                        </div>
                        <div class="text">Profile</div>
                    </a>
                </li>
                <li style="--bg:#0fc70f;">
                    <a href="#">
                        <div class="icon">
                            <ion-icon name="chatbubble-outline"></ion-icon>
                        </div>
                        <div class="text">Inbox</div>
                    </a>
                </li>
            </div>

            <!-- Bottom Section -->
            <div class="bottom">
                <li style="--bg:#333;">
                    <a href="#">
                        <div class="icon">
                            <div class="imgBx">
                                <img src="images/photo.png" alt="User">
                            </div>
                        </div>
                        <div class="text">NMSCoding</div>
                    </a>
                </li>
                <li style="--bg:#333;">
                    <a href="#">
                        <div class="icon">
                            <ion-icon name="log-out-outline"></ion-icon>
                        </div>
                        <div class="text">Logout</div>
                    </a>
                </li>
            </div>
        </ul>
    </div>

    <script>
        const menuToggle = document.querySelector('.MenuToggle');
        const sidebar = document.querySelector('.sidebar');
        menuToggle.onclick = function() {
            menuToggle.classList.toggle('active');
            sidebar.classList.toggle('active');
        }
    </script>
</body>
</html>
